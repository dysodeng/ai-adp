version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - copylock
    - noctx
    - bodyclose

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/dysodeng/ai-adp
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - paramTypeCombine
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - unparam
    - path: "internal/di/wire_gen\\.go"
      linters:
        - all
    - path: ".*/mock/.*\\.go"
      linters:
        - all
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  go: "1.25"
