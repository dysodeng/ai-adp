# AI Development Platform 配置文件

app:
  name: ai-adp
  env: development
  debug: true

server:
  http:
    port: 8080
    read_timeout: 30       # 秒
    write_timeout: 60      # 秒
    shutdown_timeout: 10   # 优雅关闭等待秒数

logger:
  level: info              # debug | info | warn | error
  format: console          # json | console（开发环境用 console）
  output_path: stdout      # stdout 或文件路径 var/logs/app.log

jwt:
  secret: "change-me-in-production"
  expire_hour: 24

database:
  host: localhost
  port: 5432
  name: ai_adp
  user: postgres
  password: ""
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 60    # 分钟

redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

tracing:
  enabled: false
  endpoint: "localhost:4317"   # OTLP gRPC collector 地址
  service_name: "ai-adp"
  sample_rate: 1.0
