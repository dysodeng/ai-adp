# AI Development Platform 配置文件

app:
  name: ai-adp
  environment: development
  debug: true

# 服务配置
server:
  http:
    enabled: true
    host: 0.0.0.0
    port: 8080
    read_timeout: 30       # 秒
    write_timeout: 60      # 秒
    shutdown_timeout: 10   # 优雅关闭等待秒数
  grpc:
    enabled: true
    host: 0.0.0.0
    port: 3000
    namespace: "app"
  websocket:
    enabled: true
    host: 0.0.0.0
    port: 4000
  event:
    enabled: true
    driver: "mq"
  health:
    enabled: true
    port: 5000

# 安全配置
security:
  jwt:
    secret: "change-me-in-production"

# 数据库配置
database:
  migration:
    enabled: true
  driver: postgres
  database:
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600s

# redis配置
redis:
  main:
    # 模式选择: standalone, cluster, sentinel
    mode: standalone
    # 单机模式配置
    host: 127.0.0.1
    port: 6379
    password:
    db: 0
    key_prefix:
    # 集群模式配置
    cluster:
      addrs:
        - "127.0.0.1:7000"
        - "127.0.0.1:7001"
        - "127.0.0.1:7002"
      password:
    # 哨兵模式配置
    sentinel:
      master_name: "mymaster"
      sentinel_addrs:
        - "127.0.0.1:26379"
        - "127.0.0.1:26380"
        - "127.0.0.1:26381"
      password:
      sentinel_password:
      db: 0
    # 连接池配置
    pool:
      min_idle_conns: 10
      max_retries: 3
      pool_size: 100

  cache:
    mode: standalone
    host: 127.0.0.1
    port: 6379
    password:
    db: 1
    key_prefix:
    cluster:
      addrs: []
      password:
    sentinel:
      master_name:
      sentinel_addrs: []
      password:
      sentinel_password:
      db: 1
    pool:
      min_idle_conns: 10
      max_retries: 3
      pool_size: 100

  mq:
    mode: standalone
    host: 127.0.0.1
    port: 6379
    password:
    db: 2
    key_prefix:
    cluster:
      addrs: []
      password:
    sentinel:
      master_name:
      sentinel_addrs: []
      password:
      sentinel_password:
      db: 2
    pool:
      min_idle_conns: 10
      max_retries: 3
      pool_size: 100

# 缓存配置
cache:
  driver: redis
  serializer: json

# 可观测性配置
monitor:
  service_name: "ai-adp"
  service_version: "v1.0.0"
  tracer: # 链路追踪
    otlp_enabled: false # 是否开启数据上报
    otlp_endpoint: "http://127.0.0.1:4318" # 上报地址
  metrics: # 监控
    otlp_enabled: false # 是否开启数据上报
    otlp_endpoint: "http://127.0.0.1:4318" # 上报地址
    otlp_interval: 30s # 数据上报间隔
  log: # 日志
    otlp_enabled: false # 是否开启数据上报
    otlp_endpoint: "http://127.0.0.1:4318" # 上报地址